<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LiftLog - Login</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-box {
            background: white;
            padding: 50px 40px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            text-align: center;
            max-width: 400px;
            width: 90%;
        }
        h1 {
            margin: 0 0 10px 0;
            font-size: 2.8em;
        }
        p {
            color: #555;
            margin-bottom: 40px;
        }
        button {
            background: #4285F4;
            color: white;
            border: none;
            padding: 18px 40px;
            font-size: 18px;
            border-radius: 12px;
            cursor: pointer;
            width: 100%;
            box-shadow: 0 6px 15px rgba(66,133,244,0.3);
        }
        button:hover {
            background: #3367d6;
        }
    </style>
</head>
<body>
    <div class="login-box">
        <h1>💪 LiftLog</h1>
        <p>Personal Workout Tracker</p>
        
        <button onclick="startGoogleLogin()">
            🔑 Sign in with Google
        </button>
        
        <p style="margin-top: 30px; color: #777; font-size: 14px;">
            Only approved emails can access
        </p>
    </div>

    <script>
        function startGoogleLogin() {
            window.location.href = '/auth/google';
        }

        // If already logged in, go straight to app
        if (localStorage.getItem('liftlog_token')) {
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
